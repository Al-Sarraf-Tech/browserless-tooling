name: Regression CI

on:
  pull_request:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: browserless-regression-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  regression:
    name: Regression (${{ matrix.batch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        batch: ["static", "integration"]
    env:
      DOCKER_RUNNER_CACHE: /tmp/docker-runner
      DOCKER_RUNNER_PRUNE: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize Docker runner cache
        run: mkdir -p /tmp/docker-runner/{images,cache,artifacts}

      - name: Static regression (bash syntax + shellcheck)
        if: matrix.batch == 'static'
        run: bash .github/scripts/docker-runner.sh debian:bookworm-slim "apt-get update && apt-get install -y shellcheck && bash -n aibrowse-setup.sh && bash -n browsewrap-setup.sh && shellcheck -x --exclude=SC2155,SC1091 aibrowse-setup.sh browsewrap-setup.sh"

      - name: Shell formatting check (shfmt)
        if: matrix.batch == 'static'
        continue-on-error: true
        run: |
          set -euo pipefail
          SHFMT_VERSION="3.10.0"
          curl -fsSL "https://github.com/mvdan/sh/releases/download/v${SHFMT_VERSION}/shfmt_v${SHFMT_VERSION}_linux_amd64" \
            -o /tmp/shfmt
          chmod +x /tmp/shfmt
          echo "::group::shfmt version"
          /tmp/shfmt --version
          echo "::endgroup::"
          echo "::warning::shfmt check is advisory — failures do not block CI"
          /tmp/shfmt -d -i 2 -ci -bn aibrowse-setup.sh browsewrap-setup.sh

      - name: Full integration regression
        if: matrix.batch == 'integration'
        run: |
          set -Eeuo pipefail
          command -v apt-get &&  sudo apt-get update || sudo dnf -y install iproute
          command -v apt-get && sudo apt-get install -y iproute2 || true

          INSTANCE="ci-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          SERVICE_HOST="localhost"
          if [ -f /.dockerenv ]; then
            SERVICE_HOST="$(ip route | awk '/default/ {print $3; exit}')"
          fi

          cleanup() {
            sudo docker rm -f "browserless-${INSTANCE}" >/dev/null 2>&1 || true
            sudo docker rm -f "browsewrap-${INSTANCE}" >/dev/null 2>&1 || true
            sudo rm -rf "/docker/aibrowse/${INSTANCE}" "/docker/browsewrap/${INSTANCE}" || true
          }
          trap cleanup EXIT

          sudo env SERVICE_HOST="${SERVICE_HOST}" bash ./aibrowse-setup.sh "${INSTANCE}"

          AIBROWSE_ENV="/docker/aibrowse/${INSTANCE}/.env"
          BROWSERLESS_PORT="$(sudo grep '^BROWSERLESS_PORT=' "${AIBROWSE_ENV}" | cut -d= -f2-)"
          BROWSERLESS_TOKEN="$(sudo grep '^BROWSERLESS_TOKEN=' "${AIBROWSE_ENV}" | cut -d= -f2-)"

          curl -fsS "http://${SERVICE_HOST}:${BROWSERLESS_PORT}/metrics?token=${BROWSERLESS_TOKEN}" >/dev/null

          SMOKE_IMG="/docker/aibrowse/${INSTANCE}/downloads/smoke-test.png"
          test -f "${SMOKE_IMG}"
          test "$(stat -c '%s' "${SMOKE_IMG}")" -gt 1024

          sudo env SERVICE_HOST="${SERVICE_HOST}" bash ./browsewrap-setup.sh "${INSTANCE}"

          WRAP_ENV="/docker/browsewrap/${INSTANCE}/.env"
          WRAPPER_PORT="$(sudo grep '^WRAPPER_PORT=' "${WRAP_ENV}" | cut -d= -f2-)"
          python3 - <<PY
          import json
          import urllib.request

          service_host = "${SERVICE_HOST}"
          port = "${WRAPPER_PORT}"
          with urllib.request.urlopen(f"http://{service_host}:{port}/healthz", timeout=10) as response:
            payload = json.loads(response.read().decode("utf-8"))
          assert payload.get("status") == "ok", payload
          PY
