name: Security CI

on:
  pull_request:
  push:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    - cron: "30 4 * * 1"

concurrency:
  group: browserless-security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  security-batches:
    name: Security (${{ matrix.batch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        batch: ["secrets", "static"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret scan (gitleaks)
        if: matrix.batch == 'secrets'
        run: |
          set -euo pipefail
          GITLEAKS_VERSION="8.24.3"
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          /tmp/gitleaks detect --source . --redact --verbose

      - name: Install shell tooling
        if: matrix.batch == 'static'
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Static security checks
        if: matrix.batch == 'static'
        run: |
          set -euo pipefail
          bash -n aibrowse-setup.sh
          bash -n browsewrap-setup.sh
          shellcheck aibrowse-setup.sh browsewrap-setup.sh

  codeql:
    name: CodeQL (actions)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: actions

      - name: Analyze
        uses: github/codeql-action/analyze@v4
