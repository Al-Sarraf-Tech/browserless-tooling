name: SBOM Generation

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: browserless-sbom-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install CycloneDX CLI
        run: |
          set -euo pipefail
          CDX_VERSION="0.27.1"
          curl -fsSL "https://github.com/CycloneDX/cyclonedx-cli/releases/download/v${CDX_VERSION}/cyclonedx-linux-x64" \
            -o /tmp/cyclonedx
          chmod +x /tmp/cyclonedx

      - name: Generate shell-project SBOM
        run: |
          set -euo pipefail

          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          COMMIT_SHA="${GITHUB_SHA}"
          TIMESTAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          cat > sbom.cdx.json <<SBOM_EOF
          {
            "bomFormat": "CycloneDX",
            "specVersion": "1.5",
            "serialNumber": "urn:uuid:$(cat /proc/sys/kernel/random/uuid)",
            "version": 1,
            "metadata": {
              "timestamp": "${TIMESTAMP}",
              "component": {
                "type": "application",
                "name": "${REPO_NAME}",
                "version": "${COMMIT_SHA:0:12}",
                "description": "Hardened Browserless Chromium and MCP wrapper provisioning scripts",
                "licenses": [{ "license": { "id": "MIT" } }]
              },
              "tools": [
                { "name": "browserless-tooling-sbom-generator", "version": "1.0.0" }
              ]
            },
            "components": [
              {
                "type": "file",
                "name": "aibrowse-setup.sh",
                "version": "${COMMIT_SHA:0:12}",
                "description": "Browserless Chromium provisioning script",
                "hashes": [{ "alg": "SHA-256", "content": "$(sha256sum aibrowse-setup.sh | cut -d' ' -f1)" }]
              },
              {
                "type": "file",
                "name": "browsewrap-setup.sh",
                "version": "${COMMIT_SHA:0:12}",
                "description": "MCP wrapper deployment script",
                "hashes": [{ "alg": "SHA-256", "content": "$(sha256sum browsewrap-setup.sh | cut -d' ' -f1)" }]
              },
              {
                "type": "application",
                "name": "docker",
                "description": "Container runtime (runtime dependency)"
              },
              {
                "type": "application",
                "name": "bash",
                "description": "Shell interpreter (runtime dependency)"
              },
              {
                "type": "application",
                "name": "firewall-cmd",
                "description": "Firewall management (runtime dependency)"
              },
              {
                "type": "application",
                "name": "openssl",
                "description": "Token generation (runtime dependency)"
              },
              {
                "type": "application",
                "name": "curl",
                "description": "Health checks and downloads (runtime dependency)"
              },
              {
                "type": "container",
                "name": "ghcr.io/browserless/chromium",
                "description": "Browserless Chromium container image"
              },
              {
                "type": "container",
                "name": "node:22-slim",
                "description": "Node.js runtime for MCP wrapper"
              }
            ]
          }
          SBOM_EOF

          echo "::group::SBOM contents"
          cat sbom.cdx.json
          echo "::endgroup::"

      - name: Validate SBOM
        run: /tmp/cyclonedx validate --input-file sbom.cdx.json --input-format json || echo "::warning::SBOM validation returned warnings"

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json
          retention-days: 90
